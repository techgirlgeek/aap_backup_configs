---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aap-backup
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default
          # --- POD LEVEL SECURITY ---
          securityContext:
            runAsNonRoot: true  # Required by 'restricted'
            seccompProfile:
              type: RuntimeDefault  # Required by 'restricted'
          restartPolicy: OnFailure
          volumes:
            - name: playbook-volume
              configMap:
                name: aap-backup-playbook
            - name: backup-volume
              persistentVolumeClaim:
                claimName: aap-backup-pvc
            - name: controller-secret
              secret:
                secretName: {{ .Values.controllerAdminSecretName }}
          containers:
            - name: backup-runner
              image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
              # Use the fixed command from our previous step to avoid UID issues
              command: ["ansible-playbook", "-i", "localhost,", "-c", "local", "/opt/playbook/backup.yaml"]
              # --- CONTAINER LEVEL SECURITY ---
              securityContext:
                allowPrivilegeEscalation: false # Required by 'restricted'
                capabilities:
                  drop:
                    - ALL # Required by 'restricted'
              env:
                - name: HOME
                  value: /tmp
                - name: CONTROLLER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.controllerAdminSecretName }}
                      key: password
                - name: CONTROLLER_HOST
                  value: "{{ .Values.controllerHost }}"
                - name: CONTROLLER_USERNAME
                  value: "{{ .Values.controllerUsername }}"
                - name: CONTROLLER_VERIFY_SSL
                  value: "false"
                - name: BACKUP_PREFIX
                  value: "{{ .Values.backupFilenamePrefix }}"
              volumeMounts:
                - name: playbook-volume
                  mountPath: /opt/playbook
                - name: backup-volume
                  mountPath: /results
